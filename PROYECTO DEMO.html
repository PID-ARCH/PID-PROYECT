<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERSONAL INSURANCE DOCUMENTS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #007bff; --dark: #343a40; --light: #f4f6f8; }
        body { font-family: 'Segoe UI', Arial; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Pantalla de Login */
        #auth-screen { text-align: center; padding: 50px 20px; }
        .google-btn { background: #4285F4; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        
        /* App Principal */
        #app-content { display: none; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--light); margin-bottom: 20px; }
        
        .section { background: #fafafa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { cursor: pointer; transition: 0.3s; font-weight: 600; }
        .btn-add { background: var(--primary); color: white; border: none; width: 100%; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 5px 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h1>🔐 Acceso Privado</h1>
        <p>Inicia sesión para gestionar tus documentos de forma segura.</p>
        <button class="google-btn" onclick="loginWithGoogle()">Entrar con Google</button>
    </div>

    <div id="app-content" class="container">
        <div class="header-flex">
            <h2>📊 Mis Documentos</h2>
            <div>
                <span id="user-email" style="font-size: 0.9em; color: #666; margin-right: 10px;"></span>
                <button class="btn-logout" onclick="logout()">Salir</button>
            </div>
        </div>

        <div class="section">
            <h3>➕ Registrar Información / Seguro</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px;">
                <input type="text" id="doc-name" placeholder="Ej: Póliza de Auto">
                <input type="text" id="doc-value" placeholder="Ej: #123456789">
                <button class="btn-add" onclick="addData()">Guardar</button>
            </div>
        </div>

        <div class="section">
            <h3>📂 Subir Archivo (PDF/Imagen)</h3>
            <input type="file" id="fileUpload">
            <button onclick="saveFile()" style="background: #28a745; color: white; border: none;">Subir Documento</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Descripción / Archivo</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
    // Tu configuración real de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyB6yuXC28SU6ujb4yLyaAUZZVNYHGM2Gs",
        authDomain: "pid-project-c9ed4.firebaseapp.com",
        projectId: "pid-project-c9ed4",
        storageBucket: "pid-project-c9ed4.firebasestorage.app",
        messagingSenderId: "191766920684",
        appId: "1:191766920684:web:9b87ce0ea8e5d7db7914c9"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let currentUser = null;
    let database = JSON.parse(localStorage.getItem("private_db")) || [];

    // --- Autenticación ---
    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then((result) => {
            currentUser = result.user;
            showApp();
        }).catch(error => {
            console.error(error);
            alert("Error al entrar: " + error.message);
        });
    }

    // Persistencia de sesión: Si ya estaba logueado, entra directo
    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            showApp();
        }
    });

    function showApp() {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        document.getElementById("user-email").innerText = currentUser.email;
        render();
    }

    function logout() {
        auth.signOut().then(() => {
            location.reload();
        });
    }

    // --- Manejo de Datos ---
    function render() {
        const table = document.getElementById("tableBody");
        table.innerHTML = "";

        // Solo mostrar lo que le pertenece al usuario logueado
        const myData = database.filter(item => item.owner === currentUser.email);

        myData.forEach((item) => {
            const realIndex = database.indexOf(item);
            let content = item.type === "text" ? 
                `<b>${item.name}:</b> ${item.value}` : 
                `<a href="${item.data}" download="${item.name}">${item.name} (Descargar)</a>`;

            table.innerHTML += `
                <tr>
                    <td>${item.type === "text" ? '📝 Dato' : '📄 Archivo'}</td>
                    <td>${content}</td>
                    <td><button class="btn-delete" onclick="deleteItem(${realIndex})">Eliminar</button></td>
                </tr>
            `;
        });

        localStorage.setItem("private_db", JSON.stringify(database));
    }

    function addData() {
        const name = document.getElementById("doc-name").value;
        const value = document.getElementById("doc-value").value;
        if (!name || !value) return alert("Completa los campos");

        database.push({
            type: "text",
            name,
            value,
            owner: currentUser.email
        });

        render();
        document.getElementById("doc-name").value = "";
        document.getElementById("doc-value").value = "";
    }

    function saveFile() {
        const fileInput = document.getElementById("fileUpload");
        const file = fileInput.files[0];
        if (!file) return alert("Selecciona un archivo");

        const reader = new FileReader();
        reader.onload = function(e) {
            database.push({
                type: "file",
                name: file.name,
                data: e.target.result,
                owner: currentUser.email
            });
            render();
            alert("Documento guardado ✔️");
        };
        reader.readAsDataURL(file);
    }

    function deleteItem(index) {
        if (confirm("¿Seguro que quieres borrar este documento?")) {
            database.splice(index, 1);
            render();
        }
    }
</script>
</body>
</html>
