<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERSONAL INSURANCE DOCUMENTS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #007bff; --dark: #343a40; --light: #f4f6f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #auth-screen { text-align: center; padding: 50px 20px; }
        .google-btn { background: #4285F4; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #app-content { display: none; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--light); margin-bottom: 20px; padding-bottom: 10px; }
        .section { background: #fafafa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { cursor: pointer; font-weight: 600; }
        .btn-add { background: var(--primary); color: white; border: none; width: 100%; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 5px 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h1>🔐 Acceso Privado</h1>
        <p>Inicia sesión para gestionar tus documentos de seguros.</p>
        <button class="google-btn" onclick="loginWithGoogle()">Entrar con Google</button>
    </div>

    <div id="app-content" class="container">
        <div class="header-flex">
            <h2>📊 Mis Documentos</h2>
            <div>
                <span id="user-email" style="font-weight: bold; margin-right: 10px;"></span>
                <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <div class="section">
            <h3>➕ Registrar Seguro</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px;">
                <input type="text" id="doc-name" placeholder="Nombre (ej. Póliza)">
                <input type="text" id="doc-value" placeholder="Dato (ej. #123)">
                <button class="btn-add" onclick="addData()">Guardar</button>
            </div>
        </div>

        <div class="section">
            <h3>📂 Subir Archivo</h3>
            <input type="file" id="fileUpload" accept="image/*,.pdf">
            <button onclick="saveFile()" style="background: #28a745; color: white; border: none; width: 100%;">Subir</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
 // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB6yuXC28SU6ujb4yLyAUaZCSVNYHGM2Gs",
  authDomain: "pid-proyecto-c9ed4.firebaseapp.com",
  projectId: "pid-proyecto-c9ed4",
  storageBucket: "pid-proyecto-c9ed4.firebasestorage.app",
  messagingSenderId: "191766920684",
  appId: "1:191766920684:web:9b87ce0ea8e5d7db7914c9",
  measurementId: "G-JRR6NSNWP7"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

    let currentUser = null;
    let database = JSON.parse(localStorage.getItem("pid_db")) || [];

    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then((result) => {
            currentUser = result.user;
            showApp();
        }).catch(error => {
            alert("Error: " + error.message);
        });
    }

    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            showApp();
        }
    });

    function showApp() {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        document.getElementById("user-email").innerText = currentUser.email;
        render();
    }

    function logout() {
        auth.signOut().then(() => { location.reload(); });
    }

    function render() {
        const table = document.getElementById("tableBody");
        table.innerHTML = "";
        const myData = database.filter(item => item.owner === currentUser.email);
        myData.forEach((item, index) => {
            let content = item.type === "text" ? 
                `<b>${item.name}:</b> ${item.value}` : 
                `<a href="${item.data}" download="${item.name}">📄 Descargar ${item.name}</a>`;
            
            table.innerHTML += `
                <tr>
                    <td>${item.type === "text" ? '📝' : '📁'}</td>
                    <td>${content}</td>
                    <td><button onclick="deleteItem(${index})" style="background:red; color:white; border:none; padding:5px; border-radius:4px;">X</button></td>
                </tr>`;
        });
        localStorage.setItem("pid_db", JSON.stringify(database));
    }

    function addData() {
        const name = document.getElementById("doc-name").value;
        const value = document.getElementById("doc-value").value;
        if (!name || !value) return;
        database.push({ type: "text", name, value, owner: currentUser.email });
        render();
        document.getElementById("doc-name").value = "";
        document.getElementById("doc-value").value = "";
    }

    function saveFile() {
        const fileInput = document.getElementById("fileUpload");
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            database.push({ type: "file", name: file.name, data: e.target.result, owner: currentUser.email });
            render();
            fileInput.value = "";
        };
        reader.readAsDataURL(file);
    }

    function deleteItem(index) {
        if (confirm("¿Eliminar?")) {
            database.splice(index, 1);
            render();
        }
    }
</script>
</body>
</html>
