<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PID - Secure Documents</title>

<style>
body { font-family: Arial; background:#eef2f5; padding:20px; }
.container { max-width:900px; margin:auto; background:white; padding:20px; border-radius:12px; }
h1 { text-align:center; }
input, button { padding:10px; margin:5px; border-radius:6px; border:1px solid #ccc; }
button { background:#007bff; color:white; cursor:pointer; }
.logout { background:red; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
th, td { padding:10px; border-bottom:1px solid #ddd; text-align:center; }
th { background:#007bff; color:white; }
</style>
</head>

<body>

<div id="auth" class="container">
    <h1>🔐 Acceso Seguro</h1>
    <button id="loginBtn">Entrar con Google</button>
</div>

<div id="app" class="container" style="display:none;">
    <h1>📊 Mis Documentos</h1>
    <p id="userEmail"></p>
    <button id="logoutBtn" class="logout">Cerrar sesión</button>

    <h3>➕ Agregar Dato</h3>
    <input id="nameInput" placeholder="Nombre">
    <input id="valueInput" placeholder="Valor">
    <button id="addBtn">Guardar</button>

    <h3>📂 Subir Archivo</h3>
    <input type="file" id="fileInput">
    <button id="uploadBtn">Subir Archivo</button>

    <table>
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Contenido</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB6yuXC28SU6ujb4yLyAUaZCSVNYHGM2Gs",
  authDomain: "pid-proyecto-c9ed4.firebaseapp.com",
  projectId: "pid-proyecto-c9ed4",
  storageBucket: "pid-proyecto-c9ed4.firebasestorage.app",
  messagingSenderId: "191766920684",
  appId: "1:191766920684:web:9b87ce0ea8e5d7db7914c9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const provider = new GoogleAuthProvider();
let currentUser = null;

// ELEMENTOS
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const addBtn = document.getElementById("addBtn");
const uploadBtn = document.getElementById("uploadBtn");

// LOGIN (REDIRECT)
loginBtn.onclick = () => {
    signInWithRedirect(auth, provider);
};

// RESULTADO LOGIN
getRedirectResult(auth)
.then(result => {
    if (result?.user) {
        console.log("Login correcto");
    }
})
.catch(err => {
    console.error(err);
    alert(err.message);
});

// ESTADO USUARIO
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        document.getElementById("auth").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("userEmail").innerText = user.email;
        loadData();
    }
});

// AGREGAR TEXTO
addBtn.onclick = async () => {
    try {
        const name = document.getElementById("nameInput").value;
        const value = document.getElementById("valueInput").value;

        if (!name || !value) return alert("Completa los campos");

        await addDoc(collection(db, "docs"), {
            type: "text",
            name,
            value,
            owner: currentUser.uid
        });

        alert("Guardado ✔️");
        loadData();

    } catch (error) {
        console.error(error);
        alert(error.message);
    }
};

// SUBIR ARCHIVO (CORREGIDO)
uploadBtn.onclick = async () => {
    try {
        const file = document.getElementById("fileInput").files[0];
        if (!file) return alert("Selecciona un archivo");

        const fileRef = ref(storage, `files/${currentUser.uid}/${Date.now()}_${file.name}`);

        await uploadBytes(fileRef, file);

        const url = await getDownloadURL(fileRef);

        await addDoc(collection(db, "docs"), {
            type: "file",
            name: file.name,
            url,
            owner: currentUser.uid
        });

        alert("Archivo subido ✔️");
        loadData();

    } catch (error) {
        console.error(error);
        alert("Error: " + error.message);
    }
};

// CARGAR DATOS
async function loadData() {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    const q = query(collection(db, "docs"), where("owner", "==", currentUser.uid));
    const snap = await getDocs(q);

    snap.forEach(d => {
        const data = d.data();

        let row = "<tr>";
        if (data.type === "text") {
            row += `<td>Texto</td><td>${data.name}: ${data.value}</td>`;
        } else {
            row += `<td>Archivo</td><td><a href="${data.url}" target="_blank">${data.name}</a></td>`;
        }

        row += `<td><button onclick="deleteItem('${d.id}')">Eliminar</button></td></tr>`;
        table.innerHTML += row;
    });
}

// ELIMINAR
window.deleteItem = async (id) => {
    await deleteDoc(doc(db, "docs", id));
    loadData();
};
</script>

</body>
</html>
