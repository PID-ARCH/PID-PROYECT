<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERSONAL INSURANCE DOCUMENTS</title>
    
    <style>
        :root { --primary: #007bff; --dark: #343a40; --light: #f4f6f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #auth-screen { text-align: center; padding: 50px 20px; }
        .google-btn { background: #4285F4; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #app-content { display: none; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--light); margin-bottom: 20px; padding-bottom: 10px; }
        .section { background: #fafafa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { cursor: pointer; font-weight: 600; }
        .btn-add { background: var(--primary); color: white; border: none; width: 100%; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 5px 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h1>🔐 Acceso Privado</h1>
        <p>Inicia sesión con tu cuenta de Google para gestionar tus documentos de seguros.</p>
        <button class="google-btn" id="loginBtn">Entrar con Google</button>
    </div>

    <div id="app-content" class="container">
        <div class="header-flex">
            <h2>📊 Mis Documentos</h2>
            <div>
                <span id="user-email" style="font-weight: bold; margin-right: 10px;"></span>
                <button class="btn-logout" id="logoutBtn">Cerrar Sesión</button>
            </div>
        </div>

        <div class="section">
            <h3>➕ Registrar Seguro / Dato</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px;">
                <input type="text" id="doc-name" placeholder="Nombre (ej. Póliza Auto)">
                <input type="text" id="doc-value" placeholder="Dato (ej. #778899)">
                <button class="btn-add" id="addBtn">Guardar Dato</button>
            </div>
        </div>

        <div class="section">
            <h3>📂 Subir Archivo</h3>
            <input type="file" id="fileUpload" accept="image/*,.pdf">
            <button id="uploadBtn" style="background: #28a745; color: white; border: none; width: 100%;">Subir y Guardar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Descripción / Archivo</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

        // CONFIGURACIÓN CORREGIDA (Sin la 'o' de proyecto)
        const firebaseConfig = {
            apiKey: "AIzaSyB6yuXC28SU6ujb4yLyaAUZZVNYHGM2Gs",
            authDomain: "pid-project-c9ed4.firebaseapp.com",
            projectId: "pid-project-c9ed4",
            storageBucket: "pid-project-c9ed4.firebasestorage.app",
            messagingSenderId: "191766920684",
            appId: "1:191766920684:web:9b87ce0ea8e5d7db7914c9",
            measurementId: "G-JRR6NSNWP7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let database = JSON.parse(localStorage.getItem("pid_db_secure")) || [];

        // --- Funciones de Interfaz ---
        const loginBtn = document.getElementById("loginBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const addBtn = document.getElementById("addBtn");
        const uploadBtn = document.getElementById("uploadBtn");

        loginBtn.onclick = () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    currentUser = result.user;
                    showApp();
                })
                .catch((error) => {
                    alert("Error al entrar: " + error.message);
                });
        };

        logoutBtn.onclick = () => {
            signOut(auth).then(() => {
                location.reload();
            });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                showApp();
            }
        });

        function showApp() {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("app-content").style.display = "block";
            document.getElementById("user-email").innerText = currentUser.email;
            render();
        }

        function render() {
            const table = document.getElementById("tableBody");
            table.innerHTML = "";
            const myData = database.filter(item => item.owner === currentUser.email);
            
            myData.forEach((item, index) => {
                const realIndex = database.indexOf(item);
                let content = item.type === "text" ? 
                    `<b>${item.name}:</b> ${item.value}` : 
                    `<a href="${item.data}" download="${item.name}" style="color:#007bff; text-decoration:none;">📄 Descargar ${item.name}</a>`;
                
                table.innerHTML += `
                    <tr>
                        <td>${item.type === "text" ? '📝 Dato' : '📁 Archivo'}</td>
                        <td>${content}</td>
                        <td><button onclick="window.deleteItem(${realIndex})" style="background:red; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">Eliminar</button></td>
                    </tr>`;
            });
            localStorage.setItem("pid_db_secure", JSON.stringify(database));
        }

        addBtn.onclick = () => {
            const name = document.getElementById("doc-name").value;
            const value = document.getElementById("doc-value").value;
            if (!name || !value) return;
            database.push({ type: "text", name, value, owner: currentUser.email });
            render();
            document.getElementById("doc-name").value = "";
            document.getElementById("doc-value").value = "";
        };

        uploadBtn.onclick = () => {
            const fileInput = document.getElementById("fileUpload");
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                database.push({ type: "file", name: file.name, data: e.target.result, owner: currentUser.email });
                render();
                fileInput.value = "";
            };
            reader.readAsDataURL(file);
        };

        window.deleteItem = (index) => {
            if (confirm("¿Seguro que quieres borrar este registro?")) {
                database.splice(index, 1);
                render();
            }
        };
    </script>
</body>
</html>
