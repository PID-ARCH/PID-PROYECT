<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PERSONAL INSURANCE DOCUMENTS</title>

<style>
body { font-family: Arial; background: #f4f6f8; padding: 20px; }
.container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
h1 { text-align: center; }
input, button { padding: 10px; margin: 5px; }
button { background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
table { width: 100%; margin-top: 20px; border-collapse: collapse; }
th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
th { background: #007bff; color: white; }
</style>
</head>

<body>

<div id="auth">
    <h2>🔐 Login</h2>
    <button id="login">Entrar con Google</button>
</div>

<div class="container" id="app" style="display:none;">
    <h1>📊 PERSONAL DOCUMENTS</h1>
    <p id="user"></p>
    <button id="logout">Cerrar sesión</button>

    <h3>➕ Agregar Datos</h3>
    <input type="text" id="name" placeholder="Nombre">
    <input type="text" id="age" placeholder="Edad">
    <button id="add">Agregar</button>

    <h3>📂 Subir Archivo</h3>
    <input type="file" id="fileUpload">
    <button id="upload">Guardar Archivo</button>

    <table>
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Contenido</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js";

// 🔥 TU CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB6yuXC28SU6ujb4yLyAUaZCSVNYHGM2Gs",
  authDomain: "pid-proyecto-c9ed4.firebaseapp.com",
  projectId: "pid-proyecto-c9ed4",
  storageBucket: "pid-proyecto-c9ed4.firebasestorage.app",
  messagingSenderId: "191766920684",
  appId: "1:191766920684:web:9b87ce0ea8e5d7db7914c9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const provider = new GoogleAuthProvider();
let user = null;

// LOGIN
document.getElementById("login").onclick = () => {
    signInWithPopup(auth, provider);
};

document.getElementById("logout").onclick = () => {
    signOut(auth);
};

// DETECTAR USUARIO
onAuthStateChanged(auth, async (u) => {
    if (u) {
        user = u;
        document.getElementById("auth").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("user").innerText = user.email;
        loadData();
    }
});

// AGREGAR TEXTO
document.getElementById("add").onclick = async () => {
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;

    if (!name || !age) return alert("Completa los campos");

    await addDoc(collection(db, "docs"), {
        type: "text",
        name,
        age,
        owner: user.uid
    });

    loadData();
};

// SUBIR ARCHIVO
document.getElementById("upload").onclick = async () => {
    const file = document.getElementById("fileUpload").files[0];
    if (!file) return alert("Selecciona archivo");

    const storageRef = ref(storage, "files/" + user.uid + "/" + file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db, "docs"), {
        type: "file",
        name: file.name,
        url,
        owner: user.uid
    });

    loadData();
};

// CARGAR DATOS
async function loadData() {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    const q = query(collection(db, "docs"), where("owner", "==", user.uid));
    const snapshot = await getDocs(q);

    snapshot.forEach(docSnap => {
        const data = docSnap.data();

        let row = "<tr>";

        if (data.type === "text") {
            row += `<td>Texto</td><td>${data.name} (${data.age})</td>`;
        } else {
            row += `<td>Archivo</td><td><a href="${data.url}" target="_blank">${data.name}</a></td>`;
        }

        row += `<td><button onclick="deleteItem('${docSnap.id}')">Eliminar</button></td></tr>`;

        table.innerHTML += row;
    });
}

// ELIMINAR
window.deleteItem = async (id) => {
    await deleteDoc(doc(db, "docs", id));
    loadData();
};
</script>

</body>
</html>
