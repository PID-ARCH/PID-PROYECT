<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PID - Personal Documents</title>

<style>
body { font-family: Arial; background: #eef2f5; padding: 20px; }
.container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
h1 { text-align: center; }
input, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ddd; }
button { background: #007bff; color: white; cursor: pointer; }
.logout { background: red; }
table { width: 100%; margin-top: 20px; border-collapse: collapse; }
th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
th { background: #007bff; color: white; }
</style>
</head>

<body>

<div id="auth" class="container">
    <h1>🔐 Acceso</h1>
    <button id="login">Entrar con Google</button>
</div>

<div id="app" class="container" style="display:none;">
    <h1>📊 Mis Documentos</h1>
    <p id="user"></p>
    <button id="logout" class="logout">Cerrar sesión</button>

    <h3>➕ Agregar Dato</h3>
    <input id="name" placeholder="Nombre">
    <input id="value" placeholder="Valor">
    <button id="add">Guardar</button>

    <h3>📂 Subir Archivo</h3>
    <input type="file" id="file">
    <button id="upload">Subir</button>

    <h3>💾 Backup</h3>
    <button onclick="exportData()">Exportar JSON</button>

    <table>
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Contenido</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6yuXC28SU6ujb4yLyAUaZCSVNYHGM2Gs",
  authDomain: "pid-proyecto-c9ed4.firebaseapp.com",
  projectId: "pid-proyecto-c9ed4",
  storageBucket: "pid-proyecto-c9ed4.firebasestorage.app",
  messagingSenderId: "191766920684",
  appId: "1:191766920684:web:9b87ce0ea8e5d7db7914c9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const provider = new GoogleAuthProvider();
let user = null;

// LOGIN
login.onclick = () => signInWithPopup(auth, provider);
logout.onclick = () => signOut(auth);

// DETECTAR USUARIO
onAuthStateChanged(auth, (u) => {
    if (u) {
        user = u;
        auth.style.display = "none";
        app.style.display = "block";
        document.getElementById("user").innerText = user.email;
        loadData();
    }
});

// AGREGAR DATO
add.onclick = async () => {
    const name = nameInput.value;
    const value = valueInput.value;
    if (!name || !value) return;

    await addDoc(collection(db, "docs"), {
        type: "text",
        name,
        value,
        owner: user.uid
    });

    loadData();
};

// SUBIR ARCHIVO
upload.onclick = async () => {
    const file = fileInput.files[0];
    if (!file) return;

    const storageRef = ref(storage, "files/" + user.uid + "/" + file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db, "docs"), {
        type: "file",
        name: file.name,
        url,
        owner: user.uid
    });

    loadData();
};

// CARGAR DATOS
async function loadData() {
    table.innerHTML = "";
    const q = query(collection(db, "docs"), where("owner", "==", user.uid));
    const snap = await getDocs(q);

    snap.forEach(d => {
        const data = d.data();

        let row = "<tr>";
        if (data.type === "text") {
            row += `<td>Texto</td><td>${data.name}: ${data.value}</td>`;
        } else {
            row += `<td>Archivo</td><td><a href="${data.url}" target="_blank">${data.name}</a></td>`;
        }

        row += `<td><button onclick="deleteItem('${d.id}')">Eliminar</button></td></tr>`;
        table.innerHTML += row;
    });
}

// ELIMINAR
window.deleteItem = async (id) => {
    await deleteDoc(doc(db, "docs", id));
    loadData();
};

// EXPORTAR
window.exportData = async () => {
    const q = query(collection(db, "docs"), where("owner", "==", user.uid));
    const snap = await getDocs(q);

    const data = [];
    snap.forEach(d => data.push(d.data()));

    const blob = new Blob([JSON.stringify(data, null, 2)]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "backup.json";
    a.click();
};
</script>

</body>
</html>
